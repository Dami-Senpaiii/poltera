<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Spezial-Montagen im Einsatz</title>
  <desc id="desc">Textbasierter Hero-Platzhalter für die Startseite.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#111111"/>
      <stop offset="100%" stop-color="#474849"/>
    </linearGradient>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <rect x="90" y="100" width="1420" height="700" rx="24" fill="none" stroke="#AB1B25" stroke-width="8"/>
  <text x="140" y="380" font-family="Arial, sans-serif" font-size="88" font-weight="700" fill="#ffffff">Spezial-Montagen</text>
  <text x="140" y="500" font-family="Arial, sans-serif" font-size="72" fill="#ffffff">&amp; Turmunterhalt</text>
  <text x="140" y="600" font-family="Arial, sans-serif" font-size="40" fill="#A7AAAB">Platzhalterbild für statisches Mockup</text>
</svg>
